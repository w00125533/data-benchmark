services:
  starrocks-fe:
    image: starrocks/fe-ubuntu:3.3-latest
    ports:
      - "8030:8030"
      - "9030:9030"

  starrocks-be:
    image: starrocks/be-ubuntu:3.3-latest
    depends_on:
      - starrocks-fe
    ports:
      - "8040:8040"

  spark:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: master
    depends_on:
      hdfs-init:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_started
    ports:
      - "8080:8080"

  hive-metastore:
    image: apache/hive:4.0.0
    environment:
      SERVICE_NAME: metastore
    depends_on:
      hdfs-init:
        condition: service_completed_successfully
    ports:
      - "9083:9083"

  hdfs-namenode:
    image: apache/hadoop:3.3.6
    hostname: hdfs-namenode
    command: ["hdfs", "namenode"]
    environment:
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-root/dfs/name"
      HADOOP_HOME: "/opt/hadoop"
      HADOOP_CONF_DIR: "/opt/hadoop/etc/hadoop"
      CORE-SITE.XML_fs.defaultFS: "hdfs://hdfs-namenode:8020"
      HDFS-SITE.XML_dfs.replication: "1"
      HDFS-SITE.XML_dfs.namenode.rpc-address: "hdfs-namenode:8020"
    ports:
      - "9870:9870"
      - "8020:8020"

  hdfs-datanode:
    image: apache/hadoop:3.3.6
    hostname: hdfs-datanode
    command: ["hdfs", "datanode"]
    environment:
      HADOOP_HOME: "/opt/hadoop"
      HADOOP_CONF_DIR: "/opt/hadoop/etc/hadoop"
      CORE-SITE.XML_fs.defaultFS: "hdfs://hdfs-namenode:8020"
      HDFS-SITE.XML_dfs.replication: "1"
    depends_on:
      - hdfs-namenode
    ports:
      - "9864:9864"

  hdfs-init:
    image: apache/hadoop:3.3.6
    command:
      - bash
      - -lc
      - |
        for i in $(seq 1 60); do
          hdfs dfs -fs hdfs://hdfs-namenode:8020 -mkdir -p /warehouse/iceberg && \
          hdfs dfs -fs hdfs://hdfs-namenode:8020 -chmod -R 777 /warehouse && exit 0
          sleep 2
        done
        exit 1
    environment:
      HADOOP_HOME: "/opt/hadoop"
      HADOOP_CONF_DIR: "/opt/hadoop/etc/hadoop"
      CORE-SITE.XML_fs.defaultFS: "hdfs://hdfs-namenode:8020"
    depends_on:
      - hdfs-namenode
      - hdfs-datanode

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  benchmark-runner:
    image: bitnami/spark:3.5
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      BENCHMARK_COMPOSE_IN_CONTAINER: "true"
      STARROCKS_JDBC_URL: "jdbc:mysql://starrocks-fe:9030/?useSSL=false&allowPublicKeyRetrieval=true"
      STARROCKS_STREAM_LOAD_URL: "http://starrocks-fe:8030/api/sr_internal/cell_kpi_1min/_stream_load"
    # Run mvn package before docker compose up so target/...jar exists.
    command: ["java", "-jar", "target/data-benchmark-0.1.0-SNAPSHOT.jar", "run", "--mode", "compose", "--run-id", "compose-smoke"]
    depends_on:
      hdfs-init:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_started
      spark:
        condition: service_started
      starrocks-fe:
        condition: service_started
      starrocks-be:
        condition: service_started
      prometheus:
        condition: service_started
