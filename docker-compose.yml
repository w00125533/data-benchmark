name: databenchmark

services:
  starrocks-fe:
    image: starrocks/fe-ubuntu:3.3-latest
    hostname: starrocks-fe-0
    command: ["/opt/starrocks/fe_entrypoint.sh", "starrocks-fe"]
    environment:
      LOG_CONSOLE: "1"
    ports:
      - "8030:8030"
      - "9030:9030"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2GB

  starrocks-be:
    image: starrocks/be-ubuntu:3.3-latest
    hostname: starrocks-be-0
    command: ["/opt/starrocks/be_entrypoint.sh", "starrocks-fe"]
    environment:
      LOG_CONSOLE: "1"
    depends_on:
      - starrocks-fe
    ports:
      - "8040:8040"
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 5GB

  spark:
    image: apache/spark:3.5.8-java17
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: ["sleep", "infinity"]
    environment:
      SPARK_MODE: master
    depends_on:
      hdfs-init:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 3GB

  hive-metastore:
    image: apache/hive:4.0.0
    hostname: hive-metastore
    environment:
      SERVICE_NAME: metastore
    depends_on:
      hdfs-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1GB

  hive-server:
    image: apache/hive:4.0.0
    hostname: hive-server
    environment:
      SERVICE_NAME: hiveserver2
    depends_on:
      hdfs-init:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_started
    ports:
      - "10000:10000"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2GB

  hdfs-namenode:
    image: apache/hadoop:3.3.6
    hostname: hdfs-namenode
    command: ["hdfs", "namenode"]
    environment:
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-root/dfs/name"
      HADOOP_HOME: "/opt/hadoop"
      HADOOP_CONF_DIR: "/opt/hadoop/etc/hadoop"
      CORE-SITE.XML_fs.defaultFS: "hdfs://hdfs-namenode:8020"
      HDFS-SITE.XML_dfs.replication: "1"
      HDFS-SITE.XML_dfs.namenode.rpc-address: "hdfs-namenode:8020"
    ports:
      - "9870:9870"
      - "8020:8020"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768MB

  hdfs-datanode:
    image: apache/hadoop:3.3.6
    hostname: hdfs-datanode
    command: ["hdfs", "datanode"]
    environment:
      HADOOP_HOME: "/opt/hadoop"
      HADOOP_CONF_DIR: "/opt/hadoop/etc/hadoop"
      CORE-SITE.XML_fs.defaultFS: "hdfs://hdfs-namenode:8020"
      HDFS-SITE.XML_dfs.replication: "1"
    depends_on:
      - hdfs-namenode
    ports:
      - "9864:9864"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1.5GB

  hdfs-init:
    image: apache/hadoop:3.3.6
    command:
      - bash
      - -lc
      - |
        for i in $(seq 1 60); do
          hdfs dfs -fs hdfs://hdfs-namenode:8020 -mkdir -p /warehouse/iceberg && \
          hdfs dfs -fs hdfs://hdfs-namenode:8020 -chmod -R 777 /warehouse && exit 0
          sleep 2
        done
        exit 1
    environment:
      HADOOP_HOME: "/opt/hadoop"
      HADOOP_CONF_DIR: "/opt/hadoop/etc/hadoop"
      CORE-SITE.XML_fs.defaultFS: "hdfs://hdfs-namenode:8020"
    depends_on:
      - hdfs-namenode
      - hdfs-datanode

  benchmark-runner:
    build:
      context: ./docker/benchmark-runner
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      BENCHMARK_COMPOSE_IN_CONTAINER: "true"
      STARROCKS_JDBC_URL: "jdbc:mysql://starrocks-fe:9030/?useSSL=false&allowPublicKeyRetrieval=true&allowMultiQueries=true"
      STARROCKS_STREAM_LOAD_URL: "http://starrocks-be:8040/api/sr_internal/cell_kpi_1min/_stream_load"
    # Run mvn package before docker compose up so target/...jar exists.
    command: ["java", "-jar", "target/data-benchmark-0.1.0-SNAPSHOT.jar", "run", "--mode", "compose", "--run-id", "compose-smoke"]
    depends_on:
      hdfs-init:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_started
      hive-server:
        condition: service_started
      spark:
        condition: service_started
      starrocks-fe:
        condition: service_started
      starrocks-be:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1GB

networks:
  default:
    name: databenchmark
